<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daftar Harga Produk</title>

<style>

body{
font-family:Arial,sans-serif;
margin:0;
padding:20px;
background:linear-gradient(135deg,#b30000,#ff1a1a,#ff6666);
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
position:relative;
}

h1{
text-align:center;
font-size:30px;
color:#c40000;
margin-bottom:25px;
}

.tambah{
position:absolute;
top:15px;
right:15px;
width:50px;
height:50px;
border:none;
border-radius:50%;
font-size:30px;
background:#c40000;
color:white;
cursor:pointer;
}

#formProduk{
display:none;
background:#f5f5f5;
padding:15px;
border-radius:15px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.simpan{
background:#c40000;
color:white;
width:100%;
font-weight:bold;
}

.menu{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin:20px 0;
}

.fileBtn{
background:#ff4d4d;
color:white;
font-size:12px;
}

.card{
background:#f6f6f6;
padding:15px;
border-radius:15px;
margin-top:15px;
position:relative;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
max-height:250px;
object-fit:cover;
border-radius:10px;
}

.harga{
font-size:18px;
font-weight:bold;
color:#c40000;
}

.ket{
color:gray;
}

.hapus{
position:absolute;
top:10px;
left:10px;
width:35px;
height:35px;
border:none;
border-radius:50%;
background:red;
color:white;
}

.kosong{
text-align:center;
padding:20px;
color:gray;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 DAFTAR HARGA PRODUK 🔥</h1>

<button class="tambah"
onclick="toggleForm()">
+
</button>

<div id="formProduk">

<h3>Tambah Produk</h3>

<input type="file"
id="foto"
accept="image/*">

<input
type="text"
id="nama"
placeholder="Nama Barang">

<input
type="text"
id="harga"
placeholder="Harga">

<textarea
id="ket"
placeholder="Keterangan">
</textarea>

<button
class="simpan"
onclick="tambahProduk()">

Simpan Produk

</button>

</div>


<div class="menu">

<button class="fileBtn" onclick="gantiFile(1)">WARDROBE</button>
<button class="fileBtn" onclick="gantiFile(2)">DINING</button>
<button class="fileBtn" onclick="gantiFile(3)">CAFE</button>
<button class="fileBtn" onclick="gantiFile(4)">LIVING</button>
<button class="fileBtn" onclick="gantiFile(5)">OFFICE</button>
<button class="fileBtn" onclick="gantiFile(6)">DRESSER</button>
<button class="fileBtn" onclick="gantiFile(7)">DLL</button>

</div>

<h3 id="judulFile">
📁 WARDROBE
</h3>

<div id="listProduk"></div>

</div>


<script>

const kategori={

1:"WARDROBE",
2:"DINING",
3:"CAFE",
4:"LIVING",
5:"OFFICE",
6:"DRESSER",
7:"DLL"

};

let fileAktif=1;

let dataProduk=
JSON.parse(
localStorage.getItem(
"produk"
)
)

||

{

1:[],
2:[],
3:[],
4:[],
5:[],
6:[],
7:[]

};

function simpanData(){

localStorage.setItem(

"produk",

JSON.stringify(
dataProduk
)

);

}


function toggleForm(){

let form=
document.getElementById(
"formProduk"
);

form.style.display=

form.style.display==="block"

?

"none"

:

"block";

}


function gantiFile(no){

fileAktif=no;

document.getElementById(
"judulFile"
).innerText=
"📁 "+kategori[no];

renderProduk();

}


function tambahProduk(){

let nama=
document.getElementById(
"nama"
).value.trim();

let harga=
document.getElementById(
"harga"
).value.trim();

let ket=
document.getElementById(
"ket"
).value.trim();

let foto=
document.getElementById(
"foto"
).files[0];


if(!nama || !harga){

alert(
"Isi nama dan harga"
);

return;

}


if(foto){

let reader=
new FileReader();

reader.onload=
function(e){

simpanProduk(

nama,
harga,
ket,
e.target.result

);

};

reader.readAsDataURL(
foto
);

}

else{

simpanProduk(

nama,
harga,
ket,
""

);

}

}



function simpanProduk(

nama,
harga,
ket,
gambar

){

dataProduk[
fileAktif
]

.push({

nama,
harga,
ket,
gambar

});

simpanData();

renderProduk();

document.getElementById(
"nama"
).value="";

document.getElementById(
"harga"
).value="";

document.getElementById(
"ket"
).value="";

document.getElementById(
"foto"
).value="";

}


function renderProduk(){

let list=
document.getElementById(
"listProduk"
);

list.innerHTML="";


if(
dataProduk[fileAktif]
.length===0
){

list.innerHTML=
'<div class="kosong">Belum ada produk</div>';

return;

}


dataProduk[
fileAktif
]

.forEach(

(item,i)=>{

list.innerHTML +=`

<div class="card">

<button
class="hapus"

onclick=
"hapusItem(${i})">

✖

</button>


${item.gambar ?

`<img src="${item.gambar}">`

:""}


<h3>

${item.nama}

</h3>


<div class="harga">

${item.harga}

</div>


<div class="ket">

${item.ket}

</div>

</div>

`;

});

}


function hapusItem(i){

if(

confirm(
"Hapus produk?"
)

){

dataProduk[
fileAktif
]

.splice(i,1);

simpanData();

renderProduk();

}

}


renderProduk();

</script>

</body>
</html>
